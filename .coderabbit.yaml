  path_instructions:
    - path: "app/**/*.{ts,tsx}"
      instructions: |
        **NEXT.JS 15 APP ROUTER CRITICAL REQUIREMENTS:**

        **1. APP ROUTER ARCHITECTURE:**
        - REQUIRE: Server Components by default for better performance and SEO
        - REQUIRE: Proper loading.tsx and error.tsx for route segments
        - REQUIRE: Server Actions for form submissions and data mutations
        - REQUIRE: Proper metadata.ts for SEO optimization
        - BLOCK: Client Components without 'use client' directive when interactivity needed
        - BLOCK: Server Components with client-side state or browser APIs
        - REQUIRE: Dynamic imports with next/dynamic for client components
        - REQUIRE: Proper Suspense boundaries for streaming
        - REQUIRE: generateStaticParams for static route generation
        - REQUIRE: Proper revalidation strategies (ISR, on-demand)
        - REQUIRE: Route groups for logical organization ((dnd), (dashboard))
        - REQUIRE: Parallel routes for complex layouts (@modal, @sidebar)
        - REQUIRE: Intercepting routes for modal-like navigation ((..)photo)
        - REQUIRE: Template files for shared layouts (template.tsx)
        - REQUIRE: Not-found pages for 404 handling (not-found.tsx)
        - REQUIRE: Global error boundaries (global-error.tsx)

        **2. SERVER COMPONENTS SECURITY:**
        - BLOCK: Sensitive data exposure in Server Components
        - REQUIRE: Proper environment variable scoping (NEXT_PUBLIC_ prefix only for client)
        - BLOCK: Client-side secrets in Server Components
        - REQUIRE: Input validation with Zod schemas in Server Actions
        - BLOCK: Error messages exposing sensitive data
        - REQUIRE: Proper authentication and authorization checks
        - REQUIRE: CSRF protection for form submissions
        - BLOCK: XSS vulnerabilities through user input rendering

        **3. SERVER ACTIONS PATTERNS (EXTERNAL API INTEGRATION):**
        - REQUIRE: 'use server' directive for Server Actions
        - REQUIRE: Server Actions for API communication with external Node.js backend
        - REQUIRE: Proper API authentication headers in Server Actions
        - REQUIRE: Form validation with server-side Zod schemas before API calls
        - REQUIRE: Proper revalidateTag() and revalidatePath() after API mutations
        - REQUIRE: Server Action error handling for API communication failures
        - REQUIRE: Client-side retry logic and error handling for Server Actions
        - BLOCK: Direct database operations in Server Actions (use external API)
        - REQUIRE: Proper async/await patterns for external API fetching
        - REQUIRE: Server-only imports for server-side API utilities

        **4. RSC (REACT SERVER COMPONENTS) PATTERNS FOR EXTERNAL API:**
        - REQUIRE: async/await in Server Components for external API fetching
        - REQUIRE: Proper RSC payload optimization
        - REQUIRE: Streaming with Suspense boundaries
        - REQUIRE: Server-only imports for server-side API utilities
        - REQUIRE: API endpoint configuration management
        - REQUIRE: Proper error boundaries for API failures
        - REQUIRE: Client-side caching strategies for API responses
        - REQUIRE: Request deduplication for external API calls

        **5. PERFORMANCE OPTIMIZATION:**
        - REQUIRE: Streaming with Suspense for progressive rendering
        - REQUIRE: Code splitting with dynamic imports
        - REQUIRE: Next.js Image component for automatic optimization
        - REQUIRE: Font optimization with next/font
        - REQUIRE: Dynamic imports with next/dynamic
        - REQUIRE: Partial Prerendering (PPR) considerations
        - REQUIRE: Edge Runtime for API-proxying routes
        - FLAG: Large bundle sizes without code splitting
        - FLAG: Missing loading states for async operations
        - SUGGEST: Parallel routes for complex layouts
        - SUGGEST: Intercepting routes for modal-like navigation

    - path: "app/**/components/**/*.{ts,tsx}"
      instructions: |
        **REACT + TYPESCRIPT CRITICAL REQUIREMENTS:**

        **1. TYPE SAFETY:**
        - BLOCK: 'any' type usage - define proper interfaces instead
        - REQUIRE: Import types using 'import type' syntax
        - BLOCK: Inline type definitions in components or services
        - REQUIRE: Explicit typing for all function parameters and return types
        - REQUIRE: 'unknown' instead of 'any' for uncertain types
        - REQUIRE: Union types instead of loose typing
        - BLOCK: Unused imports and unreachable code paths
        - REQUIRE: 'readonly' for immutable properties
        - REQUIRE: Proper null/undefined handling with optional chaining

        **2. SECURITY REQUIREMENTS:**
        - BLOCK: dangerouslySetInnerHTML without proper sanitization (use DOMPurify)
        - BLOCK: Hardcoded sensitive data (API keys, passwords, tokens, secrets)
        - BLOCK: Sensitive data logging (passwords, tokens, PII, credit cards, SSNs)
        - BLOCK: console.log statements in production code (use proper logging service)
        - BLOCK: Secrets in client-side environment variables (use NEXT_PUBLIC_ prefix only)
        - REQUIRE: HTTPS for ALL API calls with proper authentication headers
        - REQUIRE: Input validation and sanitization before processing
        - BLOCK: Error messages exposing sensitive data or internal details
        - REQUIRE: Content Security Policy (CSP) headers
        - REQUIRE: Secure cookie settings (HttpOnly, Secure, SameSite=Strict)
        - REQUIRE: CSRF token validation in API requests
        - BLOCK: JWT token storage in localStorage (use HttpOnly cookies)

        **3. REACT PATTERNS & CODE QUALITY:**
        - REQUIRE: PascalCase for component files with descriptive names
        - REQUIRE: Custom hooks starting with 'use' and camelCase
        - BLOCK: Direct API calls in components - use service layer pattern
        - REQUIRE: React.memo for expensive components
        - REQUIRE: Proper loading states and error boundaries
        - REQUIRE: Proper dependency arrays in useEffect/useMemo
        - REQUIRE: Feature-based directory structure
        - REQUIRE: Named exports for components and 'export type' for types
        - REQUIRE: Single responsibility principle for components
        - REQUIRE: Component composition over inheritance
        - REQUIRE: Proper prop interfaces with validation
        - REQUIRE: Default props and prop types
        - BLOCK: Large components exceeding 200 lines
        - BLOCK: Complex conditional rendering without proper abstraction
        - FLAG: Missing React.memo for expensive components
        - FLAG: Inconsistent component naming patterns
        - SUGGEST: Custom hooks for reusable logic
        - SUGGEST: Higher-order components for cross-cutting concerns

        **4. CONSTANTS & MAGIC VALUES:**
        - BLOCK: Magic values (hardcoded strings, numbers, URLs, colors, dimensions)
        - REQUIRE: Named constants for ALL hardcoded values
        - REQUIRE: Descriptive constant names explaining the value's purpose
        - REQUIRE: Constants imported from /constants directory
        - REQUIRE: 'as const' assertions for type safety
        - REQUIRE: UPPER_SNAKE_CASE for constant names

        **5. ACCESSIBILITY:**
        - REQUIRE: ARIA labels and roles for ALL interactive elements
        - REQUIRE: Semantic HTML (nav, main, section, article, header, footer)
        - REQUIRE: Proper heading hierarchy (h1, h2, h3, etc.)
        - REQUIRE: Alt text for ALL images and icons
        - REQUIRE: Keyboard navigation support for interactive elements
        - REQUIRE: Sufficient color contrast ratios (WCAG AA compliance)
        - REQUIRE: Focus indicators for keyboard navigation
        - REQUIRE: Proper form labels and fieldset groupings

        **6. PERFORMANCE:**
        - REQUIRE: Code splitting with React.lazy() for route-based splitting
        - REQUIRE: Dynamic imports for heavy components and libraries
        - REQUIRE: Bundle size optimization with tree shaking
        - REQUIRE: Proper memoization with useMemo and useCallback
        - REQUIRE: Image optimization (WebP format, proper sizing)
        - FLAG: Missing loading strategies (lazy loading, preloading)
        - SUGGEST: Virtual scrolling for large lists
        - SUGGEST: Bundle size monitoring and performance budgets

        **7. ERROR HANDLING & BOUNDARIES:**
        - REQUIRE: Error boundaries for graceful error handling
        - REQUIRE: Proper error states and fallback UI
        - BLOCK: Unhandled promise rejections in async operations
        - REQUIRE: Proper error logging without sensitive data exposure
        - REQUIRE: User-friendly error messages
        - FLAG: Missing error boundaries for critical components
        - SUGGEST: Global error boundary implementation

        **8. STATE MANAGEMENT:**
        - REQUIRE: Proper state management patterns (useState, useReducer, Context)
        - BLOCK: Prop drilling for deeply nested components
        - REQUIRE: State normalization for complex data
        - REQUIRE: Proper state updates with immutability
        - FLAG: Excessive re-renders due to state management
        - SUGGEST: State management libraries for complex applications (Zustand, Redux Toolkit)

        **9. REACT QUERY (TANSTACK QUERY) PATTERNS (CLIENT-SIDE ONLY):**
        - REQUIRE: React Query for client-side state management only
        - REQUIRE: useQuery for client-side data fetching with proper error handling
        - REQUIRE: useMutation for client-side data mutations with optimistic updates
        - REQUIRE: Proper query keys with consistent naming conventions
        - REQUIRE: Query invalidation after successful mutations
        - REQUIRE: Proper loading and error states for all queries
        - REQUIRE: Query retry logic with exponential backoff
        - REQUIRE: Cache management with proper stale time configuration
        - REQUIRE: Background refetching for stale data
        - REQUIRE: Optimistic updates with proper rollback mechanisms
        - REQUIRE: Hydration of server data with Query Client
        - BLOCK: Direct API calls in components - use React Query hooks
        - BLOCK: Unhandled query errors without proper error boundaries
        - BLOCK: Mutations without query invalidation
        - BLOCK: React Query in Server Components (use fetch() instead)
        - FLAG: Missing query invalidation after mutations
        - FLAG: Inconsistent query key patterns
        - FLAG: Missing optimistic updates for user interactions
        - SUGGEST: Custom query hooks for reusable data fetching logic
        - SUGGEST: Query client configuration for global cache settings

        **10. CODE ORGANIZATION:**
        - REQUIRE: Feature-based directory structure
        - REQUIRE: Proper file naming conventions
        - REQUIRE: Separation of concerns (components, hooks, utilities)
        - REQUIRE: Barrel exports (index.ts files) for clean imports
        - BLOCK: Circular dependencies between modules
        - FLAG: Large files exceeding 300 lines
        - SUGGEST: Component composition over inheritance

