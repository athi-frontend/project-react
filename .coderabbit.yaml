        - REQUIRE: Default export of error component
        - REQUIRE: Proper error parameter handling
        - REQUIRE: User-friendly error display
        - REQUIRE: Error recovery options
        - REQUIRE: Proper error logging
        - BLOCK: Sensitive data in error messages
        - FLAG: Missing error recovery
        - SUGGEST: Error reporting setup

    - path: "middleware.{ts,js}"
      instructions: |
        **NEXT.JS MIDDLEWARE CRITICAL REQUIREMENTS:**

        **1. MIDDLEWARE FUNCTIONALITY:**
        - REQUIRE: Default export of middleware function
        - REQUIRE: Proper request/response handling for client-side routing
        - REQUIRE: Authentication and authorization checks for protected routes
        - REQUIRE: Secure headers configuration for client-side security
        - REQUIRE: API authentication token handling for external API calls
        - REQUIRE: Secure cookie management for authentication
        - REQUIRE: Route protection and redirects for unauthorized access
        - REQUIRE: Client-side security headers (CSP, X-Frame-Options, etc.)
        - BLOCK: Sensitive data exposure in middleware
        - FLAG: Missing security headers
        - SUGGEST: Performance monitoring for client-side routing

    - path: "app/**/(.*)/page.{ts,tsx}"
      instructions: |
        **ROUTE GROUP PAGES CRITICAL REQUIREMENTS:**

        **1. PAGE STRUCTURE:**
        - REQUIRE: Default export of page component
        - REQUIRE: generateMetadata for dynamic SEO
        - REQUIRE: Proper params and searchParams typing
        - REQUIRE: Server-side data fetching for external API
        - REQUIRE: Proper error handling for API failures
        - REQUIRE: Loading states for async operations
        - BLOCK: Client-side data fetching in Server Components
        - FLAG: Missing metadata generation
        - SUGGEST: SEO optimization

    - path: "app/**/@*/page.{ts,tsx}"
      instructions: |
        **PARALLEL ROUTES CRITICAL REQUIREMENTS:**

        **1. PARALLEL ROUTE IMPLEMENTATION:**
        - REQUIRE: Default export of slot component
        - REQUIRE: Proper slot component structure
        - REQUIRE: Conditional rendering based on route
        - REQUIRE: Proper error boundaries for slots
        - REQUIRE: Loading states for slot content
        - FLAG: Missing slot error handling
        - SUGGEST: Slot-specific optimizations

    - path: "next.config.{ts,js,mjs}"
      instructions: |
        **NEXT.JS CONFIGURATION CRITICAL REQUIREMENTS:**

        **1. CONFIGURATION SETUP:**
        - REQUIRE: TypeScript settings and type checking configuration
        - REQUIRE: Image optimization and domains setup
        - REQUIRE: Font optimization with next/font
        - REQUIRE: Security headers and CSP configuration
        - REQUIRE: Redirects and rewrites setup
        - REQUIRE: Environment variable handling
        - REQUIRE: Build optimization settings
        - REQUIRE: Output settings for deployment

        **2. SECURITY & PERFORMANCE:**
        - BLOCK: Experimental features without careful consideration
        - REQUIRE: Webpack configuration if needed
        - REQUIRE: Bundle analyzer settings
        - REQUIRE: Performance monitoring setup
        - FLAG: Missing security headers configuration
        - SUGGEST: Custom webpack configuration for optimization

    - path: "package.json"
      instructions: |
        **PACKAGE MANAGEMENT CRITICAL REQUIREMENTS:**

        **1. DEPENDENCY SECURITY:**
        - REQUIRE: Proper version ranges (^, ~, >=) instead of wildcards (*)
        - REQUIRE: Dependencies separated from devDependencies correctly
        - REQUIRE: Security-focused dependencies (DOMPurify, sanitize-html, etc.)
        - REQUIRE: Lightweight alternatives (lodash-es over lodash, date-fns over moment)
        - REQUIRE: Peer dependencies for libraries
        - BLOCK: Known security vulnerabilities in dependencies
        - REQUIRE: npm audit fix for known security issues

        **2. PROJECT METADATA:**
        - REQUIRE: Proper metadata (name, version, description)
        - REQUIRE: Organized scripts section with proper build and dev commands
        - REQUIRE: Repository and license information
        - REQUIRE: Bundle optimization considerations
        - REQUIRE: Security policy and vulnerability reporting
        - REQUIRE: Next.js version and React version compatibility

    - path: "package-lock.json,yarn.lock,pnpm-lock.yaml"
      instructions: |
        **LOCK FILE CRITICAL REQUIREMENTS:**

        **1. LOCK FILE INTEGRITY:**
        - REQUIRE: Lock file presence and integrity
        - REQUIRE: Consistent package manager usage across the team
        - REQUIRE: Version conflicts checking
        - REQUIRE: Security vulnerability implications consideration
        - REQUIRE: Lock files committed to version control
        - REQUIRE: Proper package manager (npm, yarn, or pnpm) consistency

    - path: ".env*"
      instructions: |
        **ENVIRONMENT VARIABLES CRITICAL SECURITY:**

        **1. SECURITY REQUIREMENTS:**
        - BLOCK: Sensitive data in client-side environment variables
        - BLOCK: API keys or secrets in .env files that go to client
        - REQUIRE: NEXT_PUBLIC_ prefix ONLY for non-sensitive client-side variables
        - REQUIRE: ALL sensitive data in server-side environment only
        - REQUIRE: Secure configuration management
        - BLOCK: Hardcoded secrets, passwords, or private keys
        - REQUIRE: Secure environment variable management for production builds
        - REQUIRE: Environment variable validation
        - REQUIRE: Proper environment variable scoping and validation
        - FLAG: Missing environment variable validation
        - SUGGEST: Environment variable schema validation

    - path: "**/*.config.{ts,js,json}"
      instructions: |
        **CONFIGURATION FILES CRITICAL SECURITY:**

        **1. SECURITY REQUIREMENTS:**
        - BLOCK: Hardcoded secrets, API keys, passwords, or tokens
        - BLOCK: Private keys or certificates committed to repository
        - REQUIRE: Environment variables for all sensitive configuration
        - BLOCK: Private keys or certificates in frontend configuration files
        - REQUIRE: Configuration values validation before use
        - REQUIRE: Secure defaults for all configuration options
        - REQUIRE: Proper configuration validation
        - FLAG: Missing configuration validation
        - SUGGEST: Configuration schema validation with Zod

    - path: "**/*.{test,spec}.{ts,tsx}"
      instructions: |
        **TESTING CRITICAL REQUIREMENTS (ONLY WHEN TEST FILES ARE CREATED OR MODIFIED):**

        **1. TEST COVERAGE:**
        - REQUIRE: Descriptive test names explaining what is being tested
        - REQUIRE: Proper test structure (Arrange, Act, Assert)
        - REQUIRE: Mock implementations for external dependencies
        - REQUIRE: Type safety in tests with proper TypeScript usage
        - REQUIRE: Test coverage and edge cases
        - REQUIRE: Appropriate testing utilities and frameworks
        - REQUIRE: Integration tests where appropriate
        - REQUIRE: Testing best practices and patterns
        - BLOCK: Hardcoded sensitive data in test files

        **2. NEXT.JS SPECIFIC TESTING:**
        - REQUIRE: Server Components and Server Actions testing
        - REQUIRE: Error testing scenarios for App Router
        - REQUIRE: Proper test data and fixtures for Next.js patterns
        - REQUIRE: App Router specific testing patterns

        **3. SECURITY TESTING:**
        - REQUIRE: XSS vulnerability prevention testing in user inputs
        - REQUIRE: CSRF token implementation testing in API calls
        - REQUIRE: Authentication and authorization flow testing
        - REQUIRE: Secure cookie settings and session management testing
        - REQUIRE: Input sanitization and validation testing
        - REQUIRE: Error handling without information leakage testing
        - REQUIRE: Rate limiting implementation testing
        - REQUIRE: CORS policy enforcement testing

    - path: "README.md"
      instructions: |
        **DOCUMENTATION CRITICAL REQUIREMENTS:**

        **1. README COMPLETENESS:**
        - REQUIRE: Proper project description and purpose
        - REQUIRE: Clear installation and setup instructions
        - REQUIRE: Usage examples and API documentation
        - REQUIRE: Environment variables and configuration documentation
        - REQUIRE: Testing and deployment procedures
        - REQUIRE: Troubleshooting section
        - REQUIRE: Security considerations
        - REQUIRE: License information
        - SUGGEST: Links to documentation and resources
 
  abort_on_close: true
  disable_cache: false
