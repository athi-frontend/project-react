
name: Deploy Next.js To Client QA

on:
  push:
    branches:
      - qa
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.CLIENT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLIENT_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}



      - name: Get Auto Scaling Group Instances
        id: get-instances
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "frontend-qa-asg" \
            --query "AutoScalingGroups[0].Instances[*].InstanceId" \
            --output text \
            --region us-east-1)
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Instances in Auto Scaling Group: $INSTANCE_IDS"

      - name: Send and Wait for SSM Document to Finish
        id: ssm-deploy
        run: |
          set -e
          echo "Sending SSM command..."

          COMMAND_ID=$(aws ssm send-command \
            --document-name "eQMS_Frontend_Code_Deploy_Doc" \
            --targets "Key=instanceIds,Values=$INSTANCE_IDS" \
            --comment "Deploying latest code from GitHub Actions" \
            --max-concurrency "50" \
            --max-errors "0" \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

          for INSTANCE in $INSTANCE_IDS; do
            while true; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $INSTANCE \
                --region us-east-1 \
                --query "Status" \
                --output text || echo "NotStarted")

              echo "[$INSTANCE] Status = $STATUS"

              if [[ "$STATUS" == "Success" ]]; then
                break
              elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
                echo "SSM command failed on instance $INSTANCE"
                exit 1
              fi

              sleep 15
            done
          done

  notify_developers:
    name: Notify Developers via Email
    needs: deploy
    runs-on: ubuntu-latest


    env:
      OUTLOOK_EMAIL: ${{ vars.OUTLOOK_EMAIL }}
      OUTLOOK_PASSWORD: ${{ vars.OUTLOOK_PASSWORD }}
      TO_EMAILS: praveenram@swaas.net,venkataramanan.shanmugasundaram@swaas.net,velmurugan.balasubramanian@swaas.net

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ env.OUTLOOK_EMAIL }}
          password: ${{ env.OUTLOOK_PASSWORD }}
          subject: "GitHub Actions: Deployment ${{ needs.deploy.result == 'success' && 'Succeeded ✅' || 'Failed ❌' }}"
          to: ${{ env.TO_EMAILS }}
          from: GitHub Actions <${{ env.OUTLOOK_EMAIL }}>
          body: |
            Hello Team,

            The deployment for frontend QA pipeline has completed with status: **${{ needs.deploy.result }}**.

            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref }}
            - Commit: ${{ github.sha }}
            - Status: ${{ needs.deploy.result == 'success' && 'Success ✅' || 'Failed ❌' }}


            View the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,  
            GitHub Actions Bot.
