name: Client UAT Frontend Deployment
 
on:
  push:
    branches:
      - demo
jobs:
  client_uat_frontend:
    runs-on: eQMS_uat_frontend
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: current path and directory
        run: |
          pwd
          ls -la
 
      - name: Build test before deploy
        run: |
          cd /home/ubuntu/frontend_build_test_env
          pwd
          ls -la
          sudo find . -mindepth 1 -delete
          cp -r /home/ubuntu/actions-runner/_work/eqms_tenant_portal/eqms_tenant_portal/* .
          aws s3 cp s3://eqms-uat-infra-files/uat_frontend_env/.env .
          npm install
          sleep 5
          npm run build
 
      - name: Deploy Latest
        if: success()
        run: |
          pm2 list
          pm2 stop eqms_tenant_portal
          cd /home/ubuntu/frontend/eqms_tenant_portal
          pwd
          ls -la
          sudo find . -mindepth 1 -delete
          sleep 5
          cp -r /home/ubuntu/actions-runner/_work/eqms_tenant_portal/eqms_tenant_portal/* .
          ls -la
          aws s3 cp s3://eqms-uat-infra-files/uat_frontend_env/.env .
          ls -la
          node --version
          npm --version
          npm install
          sleep 5
          npm run build
          pm2 restart eqms_tenant_portal
          pm2 list
 
  notify_developers:
    name: Notify Developers via Email
    needs: client_uat_frontend
    runs-on: ubuntu-latest
 
    env:
      OUTLOOK_EMAIL: ${{ vars.OUTLOOK_EMAIL }}
      OUTLOOK_PASSWORD: ${{ vars.OUTLOOK_PASSWORD }}
      TO_EMAILS: praveenram@swaas.net,prateek.chaudhary@swaas.net
 
    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ env.OUTLOOK_EMAIL }}
          password: ${{ env.OUTLOOK_PASSWORD }}
          subject: "GitHub Actions: Deployment ${{ needs.client_uat_frontend.result == 'success' && 'Succeeded ✅' || 'Failed ❌' }}"
          to: ${{ env.TO_EMAILS }}
          from: GitHub Actions <${{ env.OUTLOOK_EMAIL }}>
          body: |
            Hello Team,
 
            The deployment pipeline has completed with status: **${{ needs.client_uat_frontend.result }}**.
 
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref }}
            - Commit: ${{ github.sha }}
            - Status: ${{ needs.client_uat_frontend.result == 'success' && 'Success ✅' || 'Failed ❌' }}
 
            View the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
 
            Regards,
            GitHub Actions Bot.
